[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_signaling_address=57.128.20.2
external_media_address=57.128.20.2
; set this to your container bridge subnet if using bridge networking
; example only:
; local_net=10.88.0.0/16

[1001]
type=auth
auth_type=userpass
username=1001
password=StrongPass1001

[1001]
type=aor
max_contacts=1
remove_existing=yes

[1001]
type=endpoint
transport=transport-udp
context=from-users
disallow=all
allow=ulaw,alaw
auth=1001
aors=1001
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[trunk-out]
type=aor
;contact=sip:139.99.29.105:5050
contact=sip:38.247.142.212:5060
qualify_frequency=60

[trunk-out]
type=endpoint
transport=transport-udp
context=from-trunk
disallow=all
allow=g729
aors=trunk-out
direct_media=no